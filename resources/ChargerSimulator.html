<html>

<head>
  <style>
    html,
    body {
      margin: 0;
    }

    body {
      background: #000;
      color: white;
      font-family: Arial;
      /* height: 100vh !important; */
    }

    button,
    input,
    select {
      width: 100%;
      margin-bottom: 5px;
      cursor: pointer;
      height: 2rem;
    }

    button {
      background: #369;
      color: #fff;
      padding: 5px 0;
      border: none;
      height: 2rem;
    }

    ul {
      background: #000;
      color: #eee;
    }

    #red,
    #green,
    #blue {
      min-width: 10px;
    }

    #red {
      background-color: red;
    }

    #green {
      background-color: green;
    }

    #blue {
      background-color: blue;
    }

    #yellow {
      background-color: yellow;
    }

    .title {
      color: #27a3ac;
      text-align: center;
      animation: changeColor ease;
      animation-iteration-count: infinite;
      animation-duration: 4s;
      animation-fill-mode: both;
      font-size: 48px;
      padding: 0;
      margin: 0;
    }

    .subTitle {
      text-align: center;
      font-size: large;
    }

    @keyframes changeColor {
      0% {
        color: rgb(146, 213, 142);
      }

      50% {
        color: rgb(133, 184, 222);
      }

      100% {
        color: rgb(146, 213, 142);
      }
    }

    .metervalues {
      display: flex;
      text-align: center;
    }

    .container {
      display: flex;
      max-height: 100%;
    }

    .console {
      flex-grow: 1;
      flex-basis: 0;
      overflow: scroll;
      max-height: 100%;
      height: 750px;
      /* background-color: cyan; */
    }

    .actions {
      flex-grow: 1;
      flex-basis: 0;
    }

    .wrapper {
      max-height: 100%;
    }

    .meterTexts {
      flex-grow: 1;
      flex-basis: 0;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <!-- <h1 class="title">INFINITY</h1> -->
    <!-- <p class="subTitle">Simple OCPP 1.6 Chargebox Simulator</p> -->
    <select style="display: none">
      <option value="">OCPP-J1.6</option>
    </select>
    <div class="container">
      <div class="actions">
        <label>Central Station</label><input id="CP" type="text" placeholder="Id Station"
          value="ws://localhost:5001/OCPP/A" <!-- value="ws://app.evoltbr.com/OCPP/A" -->
        <!-- value="wss://app.evoltbr.com/OCPP/A" -->
        />
        <label>Tag</label><input id="TAG" type="text" placeholder="Tag" value="" />
        <label>Connector uid</label>
        <input id="CUID" type="text" placeholder="Connector uid" value="1" />
        <h2>Actions</h2>
        <button id="connect">Connect</button>
        <button id="send">Authorize</button>
        <button id="start">Start Transaction</button>
        <button id="stop">Stop Transaction</button>
        <button id="status">Status Notification</button>
        <button id="data_transfer">Data Transfer</button>
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
          <button id="heartbeat">Heartbeat</button>
          <div style="flex: 1;">
            <label>Current power (W)</label>
            <input id="currentPowerW" type="text" placeholder="Current charge" value="10" />
          </div>
          <div style="flex: 1;">
            <label>Meter value</label>
            <input id="metervalue" type="text" placeholder="Meter value" value="1" />
          </div>
          <div style="flex: 1;">
            <label>SoC</label>
            <input id="currentSoC" type="text" placeholder="State of Charge" value="30" />
          </div>
          <div style="flex: 1;">
            <label>Temperature</label>
            <input id="temperature" type="text" placeholder="Temperature" value="40" />
          </div>
        </div>

        <label>transactionId</label>
        <input id="transactionId" type="text" placeholder="transactionId" value="1" />
        <label>Connector Status</label>

        <div style="display: flex; gap: 10px;">
          <select name="ConnectorStatus" id="ConnectorStatus">
            <option value="Available">Available</option>
            <option value="Preparing">Preparing</option>
            <option value="Charging">Charging</option>
            <option value="SuspendedEV">SuspendedEV</option>
            <option value="SuspendedEVSE">SuspendedEVSE</option>
            <option value="Finishing">Finishing</option>
            <option value="Reserved">Reserved</option>
            <option value="Faulted">Faulted</option>
            <option value="Offline">Offline</option>
          </select>
          <button id="buttonPreparing">Preparing</button>
          <button id="buttonAvailable">Available</button>
        </div>
        <div style="display: flex; gap: 10px;">
          <button id="mv">Send Current Meter Values</button>
          <button id="incrementAndSendMeterValues">Increment + Send Meter Values</button>
        </div>
        <div style="display: flex; gap: 10px;">
          <label>Increment value</label>
          <input id="meterIncrement" type="text" placeholder="meterIncrement" value="1" />
          <label>Time interval</label>
          <input id="meterInterval" type="text" placeholder="meterInterval" value="1000" />
          <label>Counter</label>
          <input id="meterSendTimes" type="text" placeholder="meterSendTimes" value="60" />
          <button id="mvp">Send Meter Values loop</button>
        </div>
        <div
          style="display:flex; gap:10px; flex-wrap:wrap; background:#2e2e2e; border:1px solid #333; border-radius:8px; padding:12px;">
          <div style="background:#2e2e2e; border:1px solid #333; border-radius:8px; padding:12px;">
            <h3 style="margin:0 0 8px 0; font-size:1rem; color:#eaeaea;">RemoteStart</h3>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
              <label
                style="display:inline-flex; align-items:center; gap:6px; margin:0; white-space:nowrap; font-size:12px;">
                <input type="checkbox" id="remoteStartReject"
                  style="width:auto; height:auto; margin:0; transform:scale(0.9);" />
                Reject
              </label>
              <label
                style="display:inline-flex; align-items:center; gap:6px; margin:0; white-space:nowrap; font-size:12px;">
                <input type="checkbox" id="remoteStartNotRespond"
                  style="width:auto; height:auto; margin:0; transform:scale(0.9);" />
                Not Respond
              </label>
            </div>
          </div>
          <div style="background:#2e2e2e; border:1px solid #333; border-radius:8px; padding:12px;">
            <h3 style="margin:0 0 8px 0; font-size:1rem; color:#eaeaea;">SetChargingProfile</h3>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
              <label
                style="display:inline-flex; align-items:center; gap:6px; margin:0; white-space:nowrap; font-size:12px;">
                <input type="checkbox" id="setChargingProfileReject"
                  style="width:auto; height:auto; margin:0; transform:scale(0.9);" />
                Reject
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="console">
        <div>
          <span class="indicator" id="red">____</span>
          <span class="indicator" id="green">____</span>
          <span class="indicator" id="blue">____</span>
          <span class="indicator" id="yellow">____</span>
        </div>
        <ul id="console"></ul>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.3.1.min.js"
    integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>

  <script>
    var timesRun = 0;

    let connector0StatusSent = false;

    let messageCounter = 0;
    var possible =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    var id = randomId();
    var _websocket = null;
    let _intervalId = null;
    var connector_locked = false;


    function randomId() {
      id = "";
      for (var i = 0; i < 36; i++) {
        id += possible.charAt(Math.floor(Math.random() * possible.length));
      }
      return id;
    }

    function webSocketSend(value) {
      console.log('[SEND]', value);
      _websocket.send(value);
    }

    function wsConnect() {
      var wsurl = $("select").val();
      var CP = $("#CP").val();
      connector0StatusSent = false;

      if (_websocket) {
        messageCounter = 0;
        if (_intervalId) { clearInterval(_intervalId); }
        _intervalId = null
        $("#red").show();
        _websocket.close(3001);
      } else {
        _websocket = new WebSocket(wsurl + "" + CP, ["ocpp1.6", "ocpp1.5"]);
        _websocket.onopen = function (authorizationData) {
          sessionStorage.setItem("LastAction", "BootNotification");
          $("#yellow").show();
          BootNotification();

          $("#connect").text("Disconnect").css("background", "green");
        };

        _websocket.onmessage = async function (msg) {
          messageCounter++;
          //console.log("websocket.message:", msg);
          var ddata = JSON.parse(msg.data);
          console.log("[DATA]:", ddata);
          if (messageCounter == 1) {
            var hb_interval = handleData(ddata);
            sessionStorage.setItem("Configuration", hb_interval);

            startHB(hb_interval * 1000);
          }

          if (ddata[0] === 3) {
            lastAction = getLastAction();
            logMsg("Response(" + lastAction + "): " + JSON.stringify(ddata[2]));

            if (lastAction == "BootNotification") {
              await sendStatusNotification();
            }

            if (lastAction == "startTransaction") {
              logMsg("Data exchange successful!");
              var transactionId = ddata[2].transactionId;
              $("#transactionId").val(transactionId);
              logMsg("TransactionId: " + transactionId);
              console.log("!TransactionId: " + transactionId);
              document.getElementById("ConnectorStatus").value = "Charging";
            }
            if (lastAction === "stopTransaction") {
              document.getElementById("ConnectorStatus").value = "Available";
              sendStatusNotification();
            }
          } else if (JSON.parse(msg.data)[0] === 4) {
            logMsg("[ERROR] (" + getLastAction() + ") Data exchange failed - JSON is not accepted!");
          } else if (JSON.parse(msg.data)[0] === 2) {
            logMsg(JSON.parse(msg.data)[2]);
            id = JSON.parse(msg.data)[1];

            switch (ddata[2]) {
              case "Reset":
                //Reset type SOFT, HARD
                var ResetS = JSON.stringify([3, id, { status: "Accepted" }]);
                webSocketSend(ResetS);
                location.reload();
                break;
              case "RemoteStopTransaction":
                //TransactionID
                var remStp = JSON.stringify([3, id, { status: "Accepted" }]);
                webSocketSend(remStp);

                $("#transactionId").val(JSON.parse(msg.data)[3].transactionId);

                stopTransaction();
                $(".indicator").hide();
                $("#yellow").show();
                break;
              case "RemoteStartTransaction":
                //Need to get idTag, connectorId (map - ddata[3])
                console.log('fantin REMOTE START');
                console.log(ddata[3]);
                $("#TAG").val(ddata[3].idTag);
                let notRespond = ($("#remoteStartNotRespond").length > 0 && $("#remoteStartNotRespond").is(":checked"));
                if (notRespond) {
                  console.log('fantin REMOTE START: NOT RESPOND');
                  break;
                }
                let status = ($("#remoteStartReject").length === 0 || $("#remoteStartReject").is(":checked")) ? "Rejected" : "Accepted";
                var remStrt = JSON.stringify([3, id, { status: status }]);
                webSocketSend(remStrt);
                startTransaction();

                break;
              case "GetConfiguration": //todofantin outra super-gambiara (ref todofantin #nf24ei98on2f89 ) 
                console.log('fantin GET CONFIG');
                var getConfig = JSON.stringify([3, id,
                  { "configurationKey": [{ "key": "HeartbeatInterval", "readonly": false, "value": "300" }] }]);
                webSocketSend(getConfig);

                break;
              case "ChangeConfiguration": //todofantin gambiara
                console.log('fantin CHANGE CONFIG');
                var changeConfig = JSON.stringify([3, id, { status: "Accepted" }]);
                webSocketSend(changeConfig);

                break;
              case "ClearChargingProfile": //todofantin gambiara
                var changeConfig = JSON.stringify([3, id, { status: "Accepted" }]);
                webSocketSend(changeConfig);

                break;
              case "SetChargingProfile": //todofantin gambiara
                let rejectProfile = ($("#setChargingProfileReject").length > 0 && $("#setChargingProfileReject").is(":checked"));
                var changeConfig = JSON.stringify([3, id, { status: rejectProfile ? "Rejected" : "Accepted" }]);
                webSocketSend(changeConfig);

                break;
              case "UnlockConnector": /////////ERROR!!!!!!!!
                //connectorId
                var UC = JSON.stringify([3, id, { status: "Accepted" }]);
                webSocketSend(UC);
                // connector_locked = false;
                // $('.indicator').hide();
                //$('#yellow').show();
                //logMsg("Connector status changed to: "+connector_locked);
                break;
              case "TriggerMessage":
                // Called by CPMS asking ChargePoint to execute the instruction
                // Implemented for MeterValues

                switch (ddata[3].requestedMessage) {
                  case "MeterValues":
                    var remStrt = JSON.stringify([3, id, { status: "Accepted" }]);
                    webSocketSend(remStrt);
                    send_meterValue();
                    break;
                  default:
                    var error = JSON.stringify([4, id]);
                    webSocketSend(error);
                }

                break;
              default:
                var error = JSON.stringify([4, id]);
                webSocketSend(error);
                break;
            }
          }
        };

        _websocket.onclose = function (evt) {
          $("#connect").text("Connect").css("background", "#369");
          if (evt.code == 3001) {
            logMsg("ws closed");
            _websocket = null;
          } else {
            logMsg("ws connection error: " + evt.code);
            $("#console").html("");
            _websocket = null;
            setTimeout(() => {
              wsConnect();
            }, 3000);
          }
        };

        _websocket.onerror = function (evt) {
          if (_websocket.readyState == 1) {
            $("#red").show();
            logMsg("ws normal error: " + evt.type);
          }
        };
      }
    }

    function logMsg(err) {
      console.log(err);
      $("#console").append("<li>" + err + "</li>");
    }

    function Authorize() {
      sessionStorage.setItem("LastAction", "Authorize");
      var Auth = JSON.stringify([
        2,
        id,
        "Authorize",
        { idTag: $("#TAG").val() },
      ]);
      webSocketSend(Auth);
    }

    function startTransaction() {
      sessionStorage.setItem("LastAction", "startTransaction");
      $(".indicator").hide();
      $("#green").show();
      connector_locked = true;
      logMsg("Connector status changed to: " + connector_locked);
      var connectorId = parseInt($("#CUID").val());
      console.log("connectorId", connectorId);
      var strtT = JSON.stringify([
        2,
        id,
        "StartTransaction",
        {
          connectorId: connectorId,
          idTag: $("#TAG").val(),
          timestamp: new Date().toISOString(),
          meterStart: parseInt($("#metervalue").val()),
          reservationId: 0,
        },
      ]);
      webSocketSend(strtT);
    }

    function stopTransaction() {
      sessionStorage.setItem("LastAction", "stopTransaction");
      $(".indicator").hide();
      connector_locked = false;
      logMsg("Connector status changed to: " + connector_locked);
      $("#yellow").show();
      var stpT = JSON.stringify([
        2,
        id,
        "StopTransaction",
        {
          transactionId: Number($("#transactionId").val()),
          idTag: $("#TAG").val(),
          timestamp: new Date().toISOString(),
          meterStop: parseInt($("#metervalue").val()),
        },
      ]);
      webSocketSend(stpT);
    }

    function handleData(data, request = false) {
      var lastAction = getLastAction();
      if ((lastAction = "BootNotification")) {
        data = data[2];
        heartbeat_interval = data.interval;

        if (heartbeat_interval == null) {
          console.log('WARNING: heartbeat_interval NULL, setting to 600s');
          heartbeat_interval = 600;
        }

        return heartbeat_interval;
      } else if ((lastAction = "StartTransaction")) {
        return "StartTransaction";
      } else if (1 == 2) {
        alert("else");
      }
    }

    function getLastAction() {
      var LastAction = sessionStorage.getItem("LastAction");
      return LastAction;
    }

    function BootNotification() {
      var BN = JSON.stringify([
        2,
        id,
        "BootNotification",
        {
          chargePointVendor: "EVoltBR",
          chargePointModel: "EVoltBR-Simulator",
          chargePointSerialNumber: "evbr-point",
          chargeBoxSerialNumber: "evbr-box",
          firmwareVersion: "1.0.0",
          iccid: "",
          imsi: "",
          meterType: "SIMULATOR",
          meterSerialNumber: "evbr-meter",
        },
      ]);

      logMsg("ws connected");

      webSocketSend(BN);
    }

    function startHB(interval) {
      logMsg("Setting heartbeat interval to " + interval);
      _intervalId = setInterval(send_heartbeat, interval);
    }

    function send_heartbeat() {
      sessionStorage.setItem("LastAction", "Heartbeat");
      var HB = JSON.stringify([2, id, "Heartbeat", {}]);
      webSocketSend(HB);
    }

    function incrementMeterValue(amount) {
      const currentCharge = amount ?? Number(document.getElementById("currentPowerW").value);

      const meterValueElement = document.getElementById("metervalue");
      console.log(meterValueElement.value);

      meterValueElement.value = (Number(meterValueElement.value) + currentCharge).toString();

      const currentSoCElement = document.getElementById("currentSoC");
      if (document.getElementById("currentSoC").value != "") {
        const currentSoC = Number(document.getElementById("currentSoC").value);
        console.log(currentSoCElement.value);
        currentSoCElement.value = (Number(currentSoCElement.value) + 1).toString();
      }
    }

    function send_meterValue() {
      console.log("MeterValues");

      sessionStorage.setItem("LastAction", "MeterValues");
      const currentPowerW = $("#currentPowerW").val();
      const currentSoC = $("#currentSoC").val();
      const amountChargedWh = $("#metervalue").val();
      const temperature = $("#temperature").val();
      console.log(1);
      let transactionId = Number($("#transactionId").val());
      if (transactionId == 0) transactionId = null; //todofantin nem enviar como null (ão colocar o transactionId no JSON)


      let sampledValue = [
        {
          value: amountChargedWh,
          unit: "Wh",
          measurand: "Energy.Active.Import.Register"
        },
        {
          value: currentPowerW,
          unit: "W",
          measurand: "Power.Active.Import"
        },
      ];

      if (currentSoC != '') {
        sampledValue.push({
          value: currentSoC,
          unit: "Percent",
          measurand: "SoC"
        });
      }

      if (temperature != '') {
        sampledValue.push({
          value: temperature,
          unit: "Celsius",
          measurand: "Temperature"
        });
      }

      const meterValuesRequest = JSON.stringify([
        2,
        id,
        "MeterValues",
        {
          connectorId: parseInt($("#CUID").val()),
          transactionId: transactionId,
          meterValue: [
            {
              timestamp: new Date().toISOString(),
              sampledValue: sampledValue,
            },
          ],
        },
      ]);

      console.log(2, meterValuesRequest);
      webSocketSend(meterValuesRequest);
    }

    function sendStatusNotification() {
      sessionStorage.setItem("LastAction", "StatusNotification");
      console.log("sss", $("#ConnectorStatus").val());

      if (!connector0StatusSent) {
        // Connector 0 ("Entire chargepoint")
        let statusNotification = JSON.stringify([
          2,
          id,
          "StatusNotification",
          {
            connectorId: 0,
            status: "Available",
            errorCode: "NoError",
          },
        ]);
        webSocketSend(statusNotification);
        connector0StatusSent = true;
        //--
      }

      statusNotification = JSON.stringify([
        2,
        id,
        "StatusNotification",
        {
          connectorId: parseInt($("#CUID").val()),
          status: $("#ConnectorStatus").val(),
          errorCode: "NoError",
          info: "",
          timestamp: new Date().toISOString(),
          vendorId: "",
          vendorErrorCode: "",
        },
      ]);
      webSocketSend(statusNotification);
    }

    $(document).ready(function () {
      $(".indicator").hide();
      $("#red").show();

      //bind controls
      $("#connect").click(function async() {
        $(".indicator").hide();
        $("#console").html("");
        wsConnect();
      });

      $("#send").click(function () {
        Authorize();
      });

      $("#start").click(function () {
        startTransaction();
      });

      $("#stop").click(function () {
        stopTransaction();
      });
      $("#mv").click(function () {
        send_meterValue();
      });
      $("#mvp").click(function () {
        let i = Number($("#meterInterval").val());
        let timesRun = 0;
        let interval = setInterval(function () {
          timesRun += 1;
          let val = Number($("#metervalue").val());
          var incrementvalue = Number($("#meterIncrement").val());
          var counter = Number($("#meterSendTimes").val());
          incrementMeterValue(incrementvalue);
          console.log("mvp", val, incrementvalue, interval, counter);
          if (timesRun === counter) {
            timesRun = 0;
            clearInterval(interval);
          }
          //do whatever here..
          send_meterValue();
        }, i);
      });

      $("#incrementAndSendMeterValues").click(function () {
        incrementMeterValue();
        send_meterValue();
      });

      $("#buttonPreparing").click(function () {
        document.getElementById("ConnectorStatus").value = "Preparing";
        sendStatusNotification();

      });
      $("#buttonAvailable").click(function () {
        document.getElementById("ConnectorStatus").value = "Available";
        sendStatusNotification();
      });

      $("#heartbeat").click(function () {
        send_heartbeat();
      });

      $("#status").click(function () {
        sendStatusNotification();
      });



      $("#data_transfer").click(function () {
        sessionStorage.setItem("LastAction", "DataTransfer");
        var DT = JSON.stringify([
          2,
          id,
          "DataTransfer",
          {
            vendorId: "rus.avt.cp",
            messageId: "GetChargeInstruction",
            data: "",
          },
        ]);
        webSocketSend(DT);
      });

      $("#connect").on("change", function () {
        if (_websocket) {
          _websocket.close(3001);
        }
      });
    });
  </script>
</body>

</html>
